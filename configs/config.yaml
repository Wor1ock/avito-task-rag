# Main Hydra configuration: composes path/model groups and defines search parameters.
defaults:
  - path: default
  - model: default
  - override hydra/job_logging: none
  - override hydra/hydra_logging: none
  - _self_

# Number of candidates retrieved by each first-stage retriever (BM25 / FAISS).
top_k_candidates: 250
# Number of documents returned after fusion / re-ranking.
top_k_final: 10

# Hybrid search fusion parameters.
hybrid:
  # Reciprocal Rank Fusion constant: score = sum(weight / (rrf_k + rank)).
  rrf_k: 30
  bm25_weight: 0.5
  dense_weight: 1

# Chunk-to-article score aggregation in the dense branch: an article is
# scored from its retrieved chunks' similarities before RRF fusion.
aggregation:
  # One of: max_p (best chunk), avg_p (mean over retrieved chunks),
  # sum_p (sum over retrieved chunks).
  strategy: avg_p

# Optional cross-encoder re-ranking stage (disabled in the baseline).
reranker:
  enabled: true
  model_name: "BAAI/bge-reranker-v2-m3"
  # How many top fused candidates are re-scored by the cross-encoder; the
  # RRF tail below this depth keeps its fusion order.
  rerank_depth: 15

# Reproducible subsampling of the calibration/test query sets for faster
# iteration. Set at most one of sample_frac (0 < f <= 1) or sample_size;
# null for both disables sampling. random_state pins the selected rows so
# validation numbers stay comparable across runs.
sampling:
  sample_frac: 1
  sample_size: null
  random_state: 42

seed: 42

hydra:
  job:
    chdir: false
  run:
    dir: .
  output_subdir: null
