# главный конфиг hydra: собирает группы path/model и задаёт параметры поиска
defaults:
  - path: default
  - model: default
  - override hydra/job_logging: none
  - override hydra/hydra_logging: none
  - _self_

# число кандидатов от каждого ретривера первой стадии (BM25 / FAISS)
top_k_candidates: 250
# число документов после слияния / реранкинга
top_k_final: 10

# параметры гибридного слияния
hybrid:
  # константа Reciprocal Rank Fusion: score = sum(weight / (rrf_k + rank))
  rrf_k: 30
  bm25_weight: 0.5
  dense_weight: 1

# агрегация скоров чанков в скор статьи в плотной ветке до слияния RRF
aggregation:
  # одно из: max_p (лучший чанк), avg_p (среднее по найденным чанкам),
  # sum_p (сумма по найденным чанкам)
  strategy: avg_p

# опциональная стадия реранкинга кросс-энкодером
reranker:
  enabled: true
  model_name: "BAAI/bge-reranker-v2-m3"
  # сколько верхних слитых кандидатов пересчитывает кросс-энкодер; хвост RRF
  # ниже этой глубины сохраняет порядок слияния
  rerank_depth: 15

# воспроизводимое сэмплирование калибровочных/тестовых запросов для быстрых
# итераций. задавайте не больше одного из sample_frac (0 < f <= 1) или
# sample_size; null у обоих отключает сэмплирование. random_state фиксирует
# выбранные строки, чтобы значения валидации оставались сравнимыми между запусками
sampling:
  sample_frac: 1
  sample_size: null
  random_state: 42

seed: 42

hydra:
  job:
    chdir: false
  run:
    dir: .
  output_subdir: null
