# Data and artifact locations. All paths are relative to the project root
# (hydra.job.chdir is disabled in the main config).
data_dir: data

# Source datasets (Feather / Parquet).
articles: ${path.data_dir}/articles.f
calibration: ${path.data_dir}/calibration.f
test: ${path.data_dir}/test.f

# Where built indexes are persisted.
index_dir: artifacts/index
bm25_index: ${path.index_dir}/bm25.pkl
faiss_index: ${path.index_dir}/index.faiss
chunk_metadata: ${path.index_dir}/chunks.parquet

# Output submission file for the test set.
submission: outputs/submission.csv
