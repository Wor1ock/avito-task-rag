# Bi-encoder used for both corpus and query embeddings. Must match the model
# the persisted FAISS index was built with, or the index must be rebuilt.
bi_encoder: "sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2"
# Torch device ("cuda"/"cpu"); null auto-detects.
device: null

# Encoding parameters.
batch_size: 64
# Encoder input truncation length. 512 is the MiniLM maximum; anything lower
# blinds the dense index to article content beyond the truncation point.
# Changing this requires rebuilding the FAISS index.
max_seq_length: 512
normalize_embeddings: true
