# би-энкодер для эмбеддингов корпуса и запросов. должен совпадать с моделью,
# на которой строился сохранённый индекс FAISS, иначе индекс нужно перестроить
bi_encoder: "BAAI/bge-m3"
# устройство torch ("cuda"/"cpu"); null — автоопределение
device: null

batch_size: 64
# Markdown статьи режется на перекрывающиеся символьные окна перед плотным
# кодированием. изменение любого значения требует перестройки индекса FAISS
chunk_size: 1500
chunk_overlap: 200
# длина усечения входа энкодера. bge-m3 нативно держит до 8192 токенов;
# 1024 с запасом покрывает чанк в 1500 символов и оставляет кодирование на CPU
# приемлемым по скорости. изменение требует перестройки индекса FAISS
max_seq_length: 1024
normalize_embeddings: true
